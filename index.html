<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do-App</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Segoe UI,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
min-height:100vh;padding:20px;color:#fff;
}
.container{
max-width:900px;margin:auto;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:24px;padding:25px;
box-shadow:0 20px 60px rgba(0,0,0,.35);
}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
h1{font-size:2rem}
.theme-btn{
border:none;padding:10px 16px;border-radius:10px;cursor:pointer
}
.subtitle{opacity:.8;margin-top:6px}
.progress-wrap{
height:10px;background:#334155;border-radius:30px;
overflow:hidden;margin:20px 0;
}
.progress{height:100%;width:0%;background:linear-gradient(90deg,#60a5fa,#8b5cf6);transition:.4s}
.controls{
display:grid;
grid-template-columns:2fr 1fr 1fr auto;
gap:10px;margin:20px 0;
}
input,select{
padding:12px;border-radius:10px;border:none;
}
.add-btn{
background:#6366f1;color:white;border:none;
padding:12px 18px;border-radius:10px;cursor:pointer
}
.search{
width:100%;margin-bottom:15px;
}
.filters{
display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;
}
.filter-btn{
padding:10px 15px;border:none;border-radius:10px;cursor:pointer
}
.task{
background:rgba(255,255,255,.08);
padding:15px;border-radius:14px;
display:flex;align-items:center;gap:12px;
margin-bottom:12px;
animation:slide .3s ease;
}
.task:hover{transform:translateY(-2px)}
@keyframes slide{
from{opacity:0;transform:translateX(-20px)}
to{opacity:1;transform:translateX(0)}
}
.task-text{flex:1}
.completed .task-text{text-decoration:line-through;opacity:.6}
.badge{
padding:4px 8px;border-radius:20px;font-size:.75rem
}
.high{background:#dc2626}
.medium{background:#d97706}
.low{background:#16a34a}
.delete{
background:#ef4444;color:white;border:none;
padding:8px 12px;border-radius:8px;cursor:pointer
}
.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;margin-top:20px
}
.stat{
background:rgba(255,255,255,.08);
padding:15px;border-radius:12px;text-align:center
}
.num{font-size:1.8rem;font-weight:bold}
.empty{text-align:center;padding:40px;opacity:.8}
.clear-btn{
margin-top:15px;width:100%;
padding:12px;border:none;border-radius:10px;
background:#f59e0b;color:#111;font-weight:bold;cursor:pointer
}
.light{
background:linear-gradient(135deg,#e0e7ff,#dbeafe,#f8fafc);
color:#111;
}
.light .container{background:rgba(255,255,255,.7)}
@media(max-width:700px){
.controls{grid-template-columns:1fr}
.stats{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
<div class="topbar">
<div>
<h1>🚀 To-Do-App</h1>
<p class="subtitle" id="clock"></p>
</div>
<button class="theme-btn" onclick="toggleTheme()">🌙 Theme</button>
</div>

<div class="progress-wrap"><div class="progress" id="progress"></div></div>

<input class="search" id="search" placeholder="Search tasks..." oninput="renderTasks()">

<div class="controls">
<input id="taskInput" placeholder="Add a task">
<select id="priority">
<option value="high">High</option>
<option value="medium">Medium</option>
<option value="low">Low</option>
</select>
<input type="date" id="dueDate">
<button class="add-btn" onclick="addTask()">Add</button>
</div>

<div class="filters">
<button class="filter-btn" onclick="setFilter('all')">All</button>
<button class="filter-btn" onclick="setFilter('active')">Active</button>
<button class="filter-btn" onclick="setFilter('completed')">Completed</button>
</div>

<div id="taskList"></div>

<div id="empty" class="empty">
<h2>📝 No Tasks Yet</h2>
<p>Add your first task and start being productive.</p>
</div>

<div class="stats">
<div class="stat"><div class="num" id="total">0</div><div>Total</div></div>
<div class="stat"><div class="num" id="done">0</div><div>Completed</div></div>
<div class="stat"><div class="num" id="left">0</div><div>Remaining</div></div>
</div>

<button class="clear-btn" onclick="clearCompleted()">Clear Completed Tasks</button>
</div>

<script>
let tasks=JSON.parse(localStorage.getItem("tasksPro"))||[];
let filter="all";

function save(){
localStorage.setItem("tasksPro",JSON.stringify(tasks));
}

function addTask(){
const text=document.getElementById("taskInput").value.trim();
const priority=document.getElementById("priority").value;
const due=document.getElementById("dueDate").value;

if(!text)return;

tasks.push({
text,priority,due,
completed:false
});

document.getElementById("taskInput").value="";
save();
renderTasks();
}

function toggleTask(i){
tasks[i].completed=!tasks[i].completed;
save();
renderTasks();
}

function deleteTask(i){
tasks.splice(i,1);
save();
renderTasks();
}

function setFilter(f){
filter=f;
renderTasks();
}

function clearCompleted(){
tasks=tasks.filter(t=>!t.completed);
save();
renderTasks();
}

function renderTasks(){
const list=document.getElementById("taskList");
const search=document.getElementById("search").value.toLowerCase();

list.innerHTML="";

let filtered=tasks.filter(t=>t.text.toLowerCase().includes(search));

if(filter==="active") filtered=filtered.filter(t=>!t.completed);
if(filter==="completed") filtered=filtered.filter(t=>t.completed);

document.getElementById("empty").style.display=filtered.length?"none":"block";

filtered.forEach(task=>{
const realIndex=tasks.indexOf(task);

const div=document.createElement("div");
div.className="task"+(task.completed?" completed":"");

div.innerHTML=`
<input type="checkbox" ${task.completed?"checked":""}
onchange="toggleTask(${realIndex})">

<div class="task-text">
<div><strong>${task.text}</strong></div>
<div style="font-size:12px;opacity:.7">
📅 ${task.due || "No date"}
</div>
</div>

<span class="badge ${task.priority}">${task.priority.toUpperCase()}</span>

<button class="delete"
onclick="deleteTask(${realIndex})">Delete</button>
`;

list.appendChild(div);
});

updateStats();
}

function updateStats(){
const total=tasks.length;
const done=tasks.filter(t=>t.completed).length;
const left=total-done;

document.getElementById("total").textContent=total;
document.getElementById("done").textContent=done;
document.getElementById("left").textContent=left;

const progress=total?done/total*100:0;
document.getElementById("progress").style.width=progress+"%";
}

function toggleTheme(){
document.body.classList.toggle("light");
}

function updateClock(){
document.getElementById("clock").textContent=
new Date().toLocaleString();
}
setInterval(updateClock,1000);
updateClock();

document.getElementById("taskInput").addEventListener("keypress",e=>{
if(e.key==="Enter") addTask();
});

renderTasks();
</script>
</body>
</html>
